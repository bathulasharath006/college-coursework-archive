<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="21f1002877">
    <title>User Home Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</head>
<body style="background-image: url('/static/user_home_page.avif');">

    <!-- NAVBAR or SEARCH BAR -->
    <nav class="navbar" style="background-color: #e3f2fd;">
        <div class="container-fluid justify-content-end">
            <form action="/search/{{ id }}" method="GET" class="d-flex" role="search">

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" id="book_name" name="searchKey" value="book_name">
                    <label class="form-check-label" for="book_name">Book</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" id="sect" name="searchKey" value="sect">
                    <label class="form-check-label" for="sect">Section</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" id="authors" name="searchKey" value="authors">
                    <label class="form-check-label" for="authors">Author</label>
                </div>
                <input class="form-control me-2" type="search" name="searchQuery" placeholder="Search" aria-label="Search">
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
        </div>
    </nav>

    <!-- FLASH CARDS -->
    <br>
    <div class="d-flex flex-row">
        <div class="container text-center">
            <div class="row row-cols-4">

                {% for book in books %}
                <div class="col mb-4">
                    <div class="card" style="width: 18rem; height:350px">
                        <div class="card-body">
                            <a href="/book_details/{{ id }}/{{book['book_id']}}">
                                <img src="/static/book_files/{{ book['book_id'] }}.jpg" height=320 class="card-img-top" alt="BOOK FILE NOT FOUND">
                            </a>
                        </div>
                    </div>
                </div>
                {% endfor %}

            </div>
        </div>

        <!-- SIDE BAR -->
        <div class="d-flex flex-column flex-shrink-0 p-3 bg-light" style="width: 280px;">
            <a href="/logged_in/{{id}}" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-dark text-decoration-none">
                <svg class="bi me-2" width="40" height="32">
                    <use xlink:href="#bootstrap"></use>
                </svg>
                <span class="fs-4">Home</span>
            </a>
            <hr>
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item">
                    <a href="#" class="nav-link active" aria-current="page">
                        <svg class="bi me-2" width="16" height="16">
                            <use xlink:href="#home"></use>
                        </svg>
                        Library
                    </a>
                </li>
                <li>
                    <a href="/user/backpack/{{ id }}" class="nav-link link-dark">
                        <svg class="bi me-2" width="16" height="16">
                            <use xlink:href="#speedometer2"></use>
                        </svg>
                        My BackPack
                    </a>
                </li>
                <li>
                    <a href="/logout" class="nav-link link-dark">
                        <svg class="bi me-2" width="16" height="16">
                            <use xlink:href="#grid"></use>
                        </svg>
                        Sign Out
                    </a>
                </li>
            </ul>
            <hr>
        </div>
    </div>
</body>
</html>
