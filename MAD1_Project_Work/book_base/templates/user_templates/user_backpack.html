<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="author" content="21f1002877">
	<title>My Backpack</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

  <link rel="stylesheet" href="/static/css_files/backpack.css">
  <link rel="stylesheet" href="/static/css_files/common.css">
</head>
<body >
	
	<a href="#" onclick="history.back()" id="goBackButton">Back</a>
	<br><br><br>
	<div class="container text-center">
	  <div class="row justify-content-between">
		<div class="col-md-5">
		<form method="POST" >

			<div>
				<label><b><h2>Student Details</h2></b></label>
			</div>
			<hr>
			<div>
				<label for="email">Email:</label>
				<input type="email" id="email" name="email" value="{{ user.email }}" disabled style="font-weight: bold;" />
			</div>
			<div>
				<label for="full_name">Full Name:</label>
				<input type="text" id="full_name" name="full_name" value="{{ user.full_name }}" disabled style="font-weight: bold;" />
			</div>
			<div>
				<label for="number">Mobile Number:</label>
				<input type="text" id="number" name="number"  value="{{ user.number }}" disabled style="font-weight: bold;" />
			</div>
		</form>
	 </div>

		<div class="col-md-7">
		<table class="table table-striped">
		 <h3 style="background-color: white; display: inline-block; padding: 5px;">Borrowed Books
		 </h3><br><br>
		  <thead>
			<tr>
			  <th scope="col">#</th>
			  <th scope="col">Book ID</th>
			  <th scope="col">Issue Date</th>
			  <th scope="col">Return Date</th>
			  <th scope="col">Action</th>      
			</tr>
		  </thead>
		  <tbody>

			 {% for each_bk in backpack %}
				<tr>
				  <th scope="row">{{ loop.index }}</th>
				  <td><a href="/admin/book_details/{{ each_bk[0] }}"> {{ each_bk[0] }} </a></td>
				  <td> {{ each_bk[1] }}  </td>
				  <td> {{ each_bk[2] }}  </td>
				  <td> <a href='/return/{{ user.id }}/{{ each_bk[0] }}/backpack' class="btn btn-danger">Return</a>
				</tr>
			{% endfor %}

		  </tbody>
		</table>
		</div>
	</div>
</div>

</body>
</html>
