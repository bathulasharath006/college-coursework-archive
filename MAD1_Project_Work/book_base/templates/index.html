<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="21f1002877">
    <title>Project BOOK BASE</title>
    <link rel="stylesheet" href="/static/css_files/index.css">
</head>
<body>

    <div class="container">
        <form action="/login" method="POST" id="login-form">
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ mail }}" placeholder="e.g. abc@gmail.com" required />
            </div>
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter Password" required />
            </div>
            <div>
                <input type="submit" value="Login">
            </div>
            <div>
                <span class="psw"><a href="/forgot_passwd" >Forgot Password?</a></span>
            </div>
            <br>
            <hr>
            <div>
            	<a href="{{ url_for('registering') }}" class="register-link">Register</a>
            </div>
        </form>

        {% if message %}
        <h1><p> {{ message | safe }} </p></h1>
        {% endif %}
    </div>

    <button class="open-button" onclick="openAdminForm()">Librarian Login</button>

    <div class="form-popup" id="adminForm">
        <form action="/admin_login" method="POST" class="form-container">
            <h1>Librarian Login</h1>
            <div>
                <label><b>Email</b></label>
                <input type="text" placeholder="Enter Email" name="email" required>
            </div>
            <div>
                <label><b>Password</b></label>
                <input type="password" placeholder="Enter Password" name="password" required>
            </div>
            <button type="submit" class="btn">Login</button>
            <button type="button" class="btn cancel" onclick="closeAdminForm()">Close</button>
        </form>
    </div>

    <script>
        function openAdminForm() 
        	  {  document.getElementById("adminForm").style.display = "block";  }
        
        	function closeAdminForm()
        	  {  document.getElementById("adminForm").style.display = "none";  }
    </script>
</body>
</html>
