<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="author" content="21f1002877">
	<title>Delete {{ role }} Account</title>
    <link rel="stylesheet" href="../static/css_files/update_details.css">

</head>

<body>

		<a href="#" onclick="history.back()" id="goBackButton">Back</a>
	
		{% if role == "Student" %}
    		<form action="/delete_student_account" method="GET" id="getDetailsForm" >
    	{% endif %}
    	{% if role == "Librarian" %}
    		<form action="/delete_librarian_account" method="GET" id="getDetailsForm" >
    	{% endif %}

            <div>
              <input type="email" id="GetDetails" name="GetDetails" value="{{ email }}" placeholder="Student Email ID" required />
              <input type="submit" value="Get Details" />
            </div>
          </form>

	{% if noDetailsMessage %}
		<h2><p style="bottom: 0; text-align: center; background-color: white;"> {{ noDetailsMessage | safe }} </p></h2>
	
	{% else %}
	
		{% if role == "Student" %}
    		<form action="/delete_student_account" method="POST" >
    	{% endif %}
    	{% if role == "Librarian" %}
    		<form action="/delete_librarian_account" method="POST" >
    	{% endif %}

    	<div>
			<label><b><h2>Delete {{ role }} Account</h2></b></label>
		</div>    
    	<div>
			<label for="email">Email:</label>
			<input type="email" id="email" name="email" value="{{ email }}" disabled/>
			<input type="hidden" name="email" value="{{ email }}">
		</div>
    	<div>
			<label for="full_name">Full Name:</label>
			<input type="text" id="full_name" name="full_name" value="{{ full_name }}" disabled/>
		</div>
    	<div>
			<label for="number">Mobile Number:</label>
			<input type="text" id="number" name="number" value="{{ number }}" disabled/>
		</div>
		<div>
			<input type="submit" value = "Delete Account" style="background-color: #008000;">
		</div>
	</form>
	{% endif %}

</body>
</html>
